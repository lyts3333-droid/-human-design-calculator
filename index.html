        function initializePage() {
            // 設置地區選擇事件監聽器
            const regionSelect = document.getElementById('region');
            if (regionSelect) {
                regionSelect.addEventListener('change', function() {
                    const region = this.value;
                    // 清空縣市和區域選單
                    const countySelect = document.getElementById('county');
                    const districtSelect = document.getElementById('district');
                    if (countySelect) {
                        countySelect.innerHTML = '<option value="">請先選擇地區</option>';
                    }
                    if (districtSelect) {
                        districtSelect.innerHTML = '<option value="">請先選擇縣市/省份</option>';
                    }
                    // 重置經緯度
                    const longitudeInput = document.getElementById('longitude');
                    const latitudeInput = document.getElementById('latitude');
                    if (longitudeInput) longitudeInput.value = '121.5';
                    if (latitudeInput) latitudeInput.value = '25.0';
                    // 重新初始化縣市選單
                    if (region) {
                        initializeCountySelect();
                    }
                });
            }
            
            // 延遲初始化縣市選單（讓瀏覽器有機會還原表單狀態後再根據地區填充）
            setTimeout(function() { initializeCountySelect(); }, 0);

            // 設置事件監聽器
            const countySelect = document.getElementById('county');
            const districtSelect = document.getElementById('district');

            if (countySelect && districtSelect) {
                // 點擊縣市下拉時：若已選地區但縣市仍是「請先選擇地區」，則重新填充（避免事件未觸發）
                countySelect.addEventListener('focus', function() {
                    const regionSelect = document.getElementById('region');
                    if (regionSelect && regionSelect.value && this.options.length <= 1) {
                        initializeCountySelect();
                    }
                });
                // 縣市選擇變更事件
                countySelect.addEventListener('change', function() {
                    const county = this.value;
                    updateDistrictSelect(county);
                    // 清空經緯度（等待選擇區域後再更新）
                    if (!county) {
                        const longitudeInput = document.getElementById('longitude');
                        const latitudeInput = document.getElementById('latitude');
                        if (longitudeInput) longitudeInput.value = '121.5';
                        if (latitudeInput) latitudeInput.value = '25.0';
                    }
                });

                // 區域選擇變更事件
                districtSelect.addEventListener('change', function() {
                    const county = countySelect.value;
                    const district = this.value;
                    console.log('選擇了區域:', { county, district });
                    if (county && district) {
                        updateCoordinates(county, district);
                    }
                });
            }

        // 重置按鈕
            const resetBtn = document.getElementById('reset-btn');
            if (resetBtn) {
                resetBtn.addEventListener('click', function() {
            document.getElementById('birth-form').reset();
            document.getElementById('message-area').innerHTML = '';
            document.getElementById('results-container').classList.add('hidden');
                    // 清空縣市和區域選單
                    const countySelect = document.getElementById('county');
                    const districtSelect = document.getElementById('district');
                    if (countySelect) {
                        countySelect.innerHTML = '<option value="">請先選擇地區</option>';
                    }
                    if (districtSelect) {
                        districtSelect.innerHTML = '<option value="">請先選擇縣市/省份</option>';
                    }
                    // 重置經緯度
                    const longitudeInput = document.getElementById('longitude');
                    const latitudeInput = document.getElementById('latitude');
                    if (longitudeInput) longitudeInput.value = '121.5';
                    if (latitudeInput) latitudeInput.value = '25.0';
                });
            }

            // 歷史記錄按鈕
            const historyBtn = document.getElementById('history-btn');
            if (historyBtn) {
                historyBtn.addEventListener('click', function() {
                    const historyContainer = document.getElementById('history-container');
                    if (historyContainer.classList.contains('hidden')) {
                        historyContainer.classList.remove('hidden');
                        renderHistoryList();
                    } else {
                        historyContainer.classList.add('hidden');
                    }
                });
            }

            // 關閉歷史記錄按鈕
            const closeHistoryBtn = document.getElementById('close-history-btn');
            if (closeHistoryBtn) {
                closeHistoryBtn.addEventListener('click', function() {
                    document.getElementById('history-container').classList.add('hidden');
                });
            }

            // 清空歷史記錄按鈕
            const clearHistoryBtn = document.getElementById('clear-history-btn');
            if (clearHistoryBtn) {
                clearHistoryBtn.addEventListener('click', function() {
                    clearAllHistory();
                });
            }
        }

        // 確保 DOM 載入後執行初始化
        (function() {
            function init() {
                try {
                    console.log('開始初始化頁面...');
                    console.log('DOM readyState:', document.readyState);
                    console.log('taiwanLocations 是否存在:', typeof taiwanLocations !== 'undefined');
                    
                    if (typeof taiwanLocations === 'undefined') {
                        console.error('taiwanLocations 未定義！');
                        return;
                    }
                    
                    if (document.readyState === 'loading') {
                        console.log('等待 DOM 載入...');
                        document.addEventListener('DOMContentLoaded', initializePage);
                    } else {
                        console.log('DOM 已準備好，立即執行初始化');
                        initializePage();
                    }
                } catch (error) {
                    console.error('初始化錯誤:', error);
                }
            }
            
            // 執行初始化
            init();
        })();
        
        // 加載基因天命數據並初始化面板（在 IIFE 外部）
        loadGeneKeysData().then(() => {
            initGeneKeyDetailPanel();
        });
    </script>

    <!-- 認證相關 JavaScript -->
    <script>
        // 全局變量
        let currentUser = null;
        let isLoginMode = true;

        // 檢查登錄狀態
        async function checkAuthStatus() {
            try {
                const response = await fetch('/api/user', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    showMainApp();
                } else if (response.status === 503) {
                    // Vercel 環境不支持登錄，直接顯示主應用（使用 localStorage）
                    console.warn('Vercel 環境：使用 localStorage 模式');
                    showMainApp();
                } else {
                    showAuthForm();
                }
            } catch (error) {
                console.error('檢查登錄狀態失敗:', error);
                // 如果 API 不可用，直接顯示主應用（使用 localStorage）
                showMainApp();
            }
        }

        // 顯示主應用
        function showMainApp() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            if (currentUser) {
                document.getElementById('user-name').textContent = currentUser.username;
            }
        }

        // 顯示登錄表單
        function showAuthForm() {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('user-info').classList.add('hidden');
        }

        // 切換登錄/註冊模式
        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('auth-title');
            const submitBtn = document.getElementById('auth-submit-btn');
            const emailInput = document.getElementById('auth-email');
            const switchText = document.getElementById('auth-switch-text');
            const switchLink = document.getElementById('auth-switch-link');

            if (isLoginMode) {
                title.textContent = '登錄';
                submitBtn.textContent = '登錄';
                emailInput.classList.add('hidden');
                switchText.textContent = '還沒有帳號？';
                switchLink.textContent = '立即註冊';
            } else {
                title.textContent = '註冊';
                submitBtn.textContent = '註冊';
                emailInput.classList.remove('hidden');
                switchText.textContent = '已有帳號？';
                switchLink.textContent = '立即登錄';
            }
        }

        // 處理登錄/註冊表單提交
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const email = document.getElementById('auth-email').value.trim();
            const remember = document.getElementById('auth-remember').checked;

            if (!username || !password) {
                alert('請輸入用戶名和密碼');
                return;
            }

            const submitBtn = document.getElementById('auth-submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '處理中...';

            try {
                const endpoint = isLoginMode ? '/api/login' : '/api/register';
                const body = isLoginMode 
                    ? { username, password, remember }
                    : { username, password, email: email || null };

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    currentUser = data.user;
                    showMainApp();
                    alert(data.message || '操作成功');
                } else if (response.status === 503) {
                    // Vercel 環境不支持登錄，直接顯示主應用
                    console.warn('Vercel 環境：跳過登錄，直接使用應用');
                    currentUser = null;
                    showMainApp();
                } else {
                    alert(data.error || '操作失敗');
                }
            } catch (error) {
                console.error('認證錯誤:', error);
                alert('網絡錯誤，請稍後再試');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isLoginMode ? '登錄' : '註冊';
            }
        });

        // 處理登出
        async function handleLogout() {
            try {
                const response = await fetch('/api/logout', {
                    method: 'POST',
                    credentials: 'include'
                });

                if (response.ok) {
                    currentUser = null;
                    showAuthForm();
                    alert('已登出');
                } else {
                    alert('登出失敗');
                }
            } catch (error) {
                console.error('登出錯誤:', error);
                alert('網絡錯誤，請稍後再試');
            }
        }

        // 頁面加載時檢查登錄狀態
        checkAuthStatus();
    </script>
    </div> <!-- 關閉 main-app -->
</body>
